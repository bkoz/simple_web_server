apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: simplewebserver
    app.kubernetes.io/component: simplewebserver
    app.kubernetes.io/instance: simplewebserver
  name: simplewebserver
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      deployment: simplewebserver
  template:
    metadata:
      labels:
        deployment: simplewebserver
    spec:
      containers:
      - envFrom:
        - secretRef:
            name: llm-config
        image: image-registry.openshift-image-registry.svc:5000/chat/simplewebserver
        imagePullPolicy: IfNotPresent
        name: simplewebserver
        ports:
        - containerPort: 8000
          protocol: TCP
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
