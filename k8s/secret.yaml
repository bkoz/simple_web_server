apiVersion: v1
kind: Secret
metadata:
  name: llm-config
  namespace: default
type: Opaque
stringData:
  # Use stringData for plain text - Kubernetes will base64 encode automatically
  LLM_URL: "https://api.openai.com/v1"
  LLM_API_KEY: "your-api-key-here"
  LLM_MODEL: "gpt-3.5-turbo"
---
# To create this secret from your actual .env file:
# kubectl create secret generic llm-config --from-env-file=.env
#
# Or to create from literal values:
# kubectl create secret generic llm-config \
#   --from-literal=LLM_URL=https://api.openai.com/v1 \
#   --from-literal=LLM_API_KEY=your-actual-key \
#   --from-literal=LLM_MODEL=gpt-3.5-turbo
